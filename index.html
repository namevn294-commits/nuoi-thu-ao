<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogotchi Hyper Evolution v12.0 - Quantum Edition</title>
    <style>
        body {
            background: linear-gradient(135deg, #020617, #0f172a);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
            user-select: none;
        }

        .game-console {
            background-color: #334155;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.9), inset 0 2px 4px rgba(255,255,255,0.2);
            border: 8px solid #1e293b;
            width: 460px;
            box-sizing: border-box;
        }

        .lcd-screen {
            background-color: #92a686;
            border: 6px solid #0f172a;
            border-radius: 14px;
            padding: 12px;
            box-sizing: border-box;
            width: 100%;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
        }

        /* Giả lập lưới pixel cổ điển */
        .lcd-screen::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%), linear-gradient(90deg, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.08) 50%);
            background-size: 3px 3px;
            z-index: 10;
            pointer-events: none;
            border-radius: 10px;
        }

        .top-bar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            color: #0f172a;
            font-weight: bold;
            font-size: 11px;
            border-bottom: 2px dashed #0f172a;
            padding-bottom: 6px;
            margin-bottom: 8px;
            text-align: center;
            position: relative;
            z-index: 11;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border: 2px solid #0f172a;
            box-sizing: border-box;
            width: 100%;
            height: 170px;
            cursor: crosshair;
            background-color: transparent;
            position: relative;
            z-index: 5;
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            color: #0f172a;
            font-weight: bold;
            font-size: 12px;
            margin-top: 8px;
            border-top: 2px dashed #0f172a;
            padding-top: 6px;
            position: relative;
            z-index: 11;
        }

        .stat-line { 
            display: flex; 
            justify-content: space-between; 
            background: rgba(0,0,0,0.07); 
            padding: 4px 6px; 
            border-radius: 4px;
        }

        .message-box {
            background: #0f172a;
            color: #4ade80;
            font-size: 13px;
            font-weight: bold;
            padding: 12px;
            margin-top: 12px;
            border-radius: 6px;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
            border: 2px solid #475569;
            line-height: 1.4;
            text-shadow: 0 0 4px rgba(74,222,128,0.5);
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            margin-top: 14px;
        }

        .tab-btn {
            background-color: #cbd5e1;
            color: #0f172a;
            border: 2px solid #94a3b8;
            padding: 8px 1px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 3px #64748b;
            transition: all 0.1s ease;
        }

        .tab-btn:active { box-shadow: 0 1px #64748b; transform: translateY(2px); }
        .tab-btn.active { background-color: #f59e0b; border-color: #d97706; color: white; }

        .control-subpanel {
            margin-top: 14px;
            background: #1e293b;
            padding: 12px;
            border-radius: 10px;
            min-height: 155px;
            box-sizing: border-box;
            border: 2px solid #475569;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .action-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 3px #b91c1c;
        }
        .action-btn:active { box-shadow: none; transform: translateY(3px); }
        .action-btn:disabled { background: #475569 !important; box-shadow: none; cursor: not-allowed; opacity: 0.4; }
        
        .interactive-input {
            width: 85%;
            padding: 6px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            margin: 6px 0;
            border-radius: 4px;
            border: 2px solid #475569;
            background: #0f172a;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="game-console">
    <div class="lcd-screen">
        <div class="top-bar">
            <span id="txtStage" style="text-align:left;">Khởi tạo...</span>
            <span id="txtStatus" style="color:#0f172a; font-weight: 900;">⚡ CHUẨN BỊ</span>
            <span style="text-align:right;">💰<span id="txtCoins">0</span> 💎<span id="txtGems">0</span> 🎫<span id="txtTickets">0</span></span>
        </div>

        <canvas id="mainCanvas" width="400" height="170"></canvas>

        <div class="stats-panel">
            <div class="stat-line"><span>🍖 Đ đói:</span> <span id="uiHunger">100</span>%</div>
            <div class="stat-line"><span>💧 Đ khát:</span> <span id="uiThirst">100</span>%</div>
            <div class="stat-line"><span>✨ Đ vui:</span> <span id="uiHappy">100</span>%</div>
            <div class="stat-line"><span>🧼 V sinh:</span> <span id="uiClean">100</span>%</div>
            <div class="stat-line" style="grid-column: span 2; justify-content: center; background: rgba(0,0,0,0.12);">
                <span id="uiLevelBadge">Cấp độ: Lvl 0 (Tiến hóa: Sơ Sinh)</span>
            </div>
        </div>
    </div>

    <div class="message-box" id="msgBox">Đang tải vũ trụ Dogotchi...</div>

    <div class="tabs">
        <button class="tab-btn active" id="tabHome" onclick="switchTab('home')">🏠 NUÔI</button>
        <button class="tab-btn" id="tabShop" onclick="switchTab('shop')">🏪 SHOP</button>
        <button class="tab-btn" id="tabGame" onclick="switchTab('game')">🎮 GAME</button>
        <button class="tab-btn" id="tabEdu" onclick="switchTab('edu')">🧠 HỌC TẬP</button>
        <button class="tab-btn" style="background:#991b1b; color:white; border-color:#7f1d1d;" onclick="triggerResetUI()">🔄 RESET</button>
    </div>

    <div class="control-subpanel">
        <!-- TAB NUÔI -->
        <div id="panel-home" class="action-grid">
            <button class="action-btn" onclick="interact('feed')">🍖 ĂN SÚP (Còn <span id="lblFood">0</span>)</button>
            <button class="action-btn" onclick="interact('drink')">💧 UỐNG NƯỚC (Còn <span id="lblWater">0</span>)</button>
            <button class="action-btn" style="background:#d97706" onclick="interact('play')">🎾 CHƠI ĐÙA</button>
			<button class="action-btn" onclick="interact('bath')">🧼 Tmap RỬA (Còn <span id="lblSoap">0</span>)</button>
            <button class="action-btn" style="background:#7c3aed" onclick="curePet()">💊 CHỮA BỆNH (Còn <span id="lblMed">0</span>)</button>
            <button class="action-btn" style="background:#4b5563;" id="btnSleep" onclick="toggleSleep()">💤 CHO NGỦ</button>
        </div>

        <!-- TAB SHOP -->
        <div id="panel-shop" class="action-grid" style="display:none;">
            <button class="action-btn" style="background:#059669" onclick="buyItem('food', 15, 'coins')">🍖 Súp (15 Vàng)</button>
            <button class="action-btn" style="background:#059669" onclick="buyItem('water', 10, 'coins')">💧 Nước (10 Vàng)</button>
            <button class="action-btn" style="background:#059669" onclick="buyItem('soap', 12, 'coins')">🧼 Xà phòng (12 Vàng)</button>
            <button class="action-btn" style="background:#ea580c" onclick="buyItem('medicine', 40, 'coins')">💊 Thuốc bệnh (40 Vàng)</button>
            <button class="action-btn" style="background:#9333ea" id="shHat" onclick="buyItem('hat', 5, 'gems')">🎩 Mũ Vải (5 💎) [Lvl 2+]</button>
            <button class="action-btn" style="background:#dc2626" id="shFlower" onclick="buyItem('flower', 10, 'gems')">🌹 Khóm Hoa (10 💎) [Lvl 3+]</button>
            <button class="action-btn" style="background:#0891b2" id="shFence" onclick="buyItem('fence', 2, 'tickets')">🚧 Hàng Rào (2 🎫) [Lvl 4+]</button>
            <button class="action-btn" style="background:#ca8a04; color:#fff;" id="shUfo" onclick="buyItem('ufo', 5, 'tickets')">🛸 Đĩa Bay (5 🎫) [Lvl 5+]</button>
        </div>

        <!-- TAB GAME -->
        <div id="panel-game" class="action-grid" style="display:none;">
            <button class="action-btn" style="background:#2563eb;" id="btnGame1" onclick="startMiniGame(1)">🦴 HỨNG XƯƠNG</button>
            <button class="action-btn" style="background:#7c3aed;" id="btnGame2" onclick="startMiniGame(2)">💣 NÉ BOM (Space)</button>
            <button class="action-btn" style="background:#059669; grid-column: span 2;" id="btnGame3" onclick="startMiniGame(3)">🔨 ĐẬP CHUỘT MÁY (Click)</button>
            <button class="action-btn" style="background:#ca8a04; color:#fff; grid-column: span 2; font-size:11px;" onclick="activateWheelUI()">🎫 VÒNG QUAY SIÊU CẤP (Tốn 1 Vé)</button>
        </div>

        <!-- TAB HỌC TẬP -->
        <div id="panel-edu" style="display:none; text-align:center; color:#fff;">
            <div id="edu-setup">
                <span style="font-weight:bold; font-size:12px; color:#fff;">Chọn môn thi tài trí tuệ kiếm Kim Cương:</span><br style="margin-bottom: 6px;">
                <button class="tab-btn" style="width:120px; background:#2563eb; color:#fff; margin-right:5px;" onclick="startMathMode()">🧮 GIẢI TOÁN</button>
                <button class="tab-btn" style="width:120px; background:#7c3aed; color:#fff;" onclick="startEnglishMode()">🇬🇧 TIẾNG ANH</button>
                <div id="math-grades" style="display:none; margin-top:8px;">
                    <button class="tab-btn" style="width:55px;" onclick="generateMath(1)">Lớp 1</button>
                    <button class="tab-btn" style="width:55px;" onclick="generateMath(2)">Lớp 2</button>
                    <button class="tab-btn" style="width:55px;" onclick="generateMath(3)">Lớp 3</button>
                    <button class="tab-btn" style="width:55px;" onclick="generateMath(4)">Lớp 4</button>
                    <button class="tab-btn" style="width:55px;" onclick="generateMath(5)">Lớp 5</button>
                </div>
            </div>
            <div id="edu-core" style="display:none;">
                <span id="edu-question" style="font-size:13px; font-weight:bold; color:#fff;">Câu hỏi?</span><br>
                <input type="text" id="edu-ans" class="interactive-input" placeholder="Nhập kết quả..."><br>
                <button class="action-btn" style="background:#10b981; width:100px; margin-right: 5px;" onclick="checkEduAnswer()">Nộp Bài</button>
                <button class="action-btn" style="background:#64748b; width:80px;" onclick="cancelEdu()">Hủy</button>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function sound(type) {
        try {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'coin') {
                osc.frequency.setValueAtTime(950, audioCtx.currentTime); gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.07);
            } else if (type === 'jump') {
                osc.frequency.setValueAtTime(280, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(750, audioCtx.currentTime + 0.09);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.09);
            } else if (type === 'boom') {
                osc.frequency.setValueAtTime(100, audioCtx.currentTime); gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        } catch(e){}
    }

    let saveState = {
        petType: null, hunger: 100, thirst: 100, happy: 100, clean: 100,
        age: 0, coins: 60, gems: 5, tickets: 2, isAlive: true, lastTick: Date.now(),
        inventory: { food: 3, water: 3, soap: 2, medicine: 1, hasHat: false, hasFlower: false, hasFence: false, hasUfo: false },
        isSleeping: false, isSick: false
    };

    if (localStorage.getItem('dogotchi_v12_hyper')) {
        saveState = JSON.parse(localStorage.getItem('dogotchi_v12_hyper'));
    }

    let dogX = 180, dogY = 120, dogAction = saveState.isSleeping ? 'sleep' : 'idle', frame = 0, dir = 1, targetX = 180;
    let activeGame = 0, gameScore = 0, gameObjects = [], gameTimer = null;
    let dogJumpY = 0, jumpVelocity = 0, isGrounded = true;
    
    let weatherList = ['sunny', 'stormy', 'snowy'];
    let currentWeather = 'sunny';
    let weatherParticles = [];
    let flashActive = false;
    let santaX = -100; 
    let ufoAngle = 0;
    let actionBubble = "";

    let isWheelSpinning = false;
    let wheelAngle = 0;
    let wheelSpeed = 0;
    let wheelItems = [
        { name: "200 Vàng 💰", f: () => saveState.coins += 200 },
        { name: "6 Kim Cương 💎", f: () => saveState.gems += 6 },
        { name: "3 Bình Thuốc 💊", f: () => saveState.inventory.medicine += 3 },
        { name: "40 Vàng 💰", f: () => saveState.coins += 40 },
        { name: "4 Vé Quay 🎫", f: () => saveState.tickets += 4 },
        { name: "2 Kim Cương 💎", f: () => saveState.gems += 2 }
    ];

    let birthdayCountdown = 0;
    let candleLit = true;
    let birthdayPrizeText = "";

    let isResetOverlayActive = false;
    let resetCursorPos = 0; 
    let eduMode = '';
    let currentMathLvl = 1;
    let correctStrAnswer = '';

    const englishDict = [
        { q: "Quả chuối", a: "banana" }, { q: "Con mèo", a: "cat" }, { q: "Máy tính", a: "computer" }, 
        { q: "Màu xanh", a: "blue" }, { q: "Cái bút", a: "pen" }, { q: "Mặt trời", a: "sun" }
    ];

    function initParticles() {
        weatherParticles = [];
        for(let i=0; i<50; i++) {
            weatherParticles.push({ x: Math.random() * 400, y: Math.random() * 170, s: 1 + Math.random() * 2, w: Math.random() });
        }
    }
	// --- MODULE: THÁC BÀ WEATHER SYNC ---
async function syncWeatherWithThacBa() {
    const API_KEY = 'YOUR_API_KEY'; // Đăng ký tại openweathermap.org
    const city = 'Thac Ba, VN';
    
    try {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}`);
        const data = await response.json();
        const weatherCondition = data.weather[0].main; // Rain, Clear, Clouds, etc.

        // Logic "phi logic": Thú cưng phản ứng với thời tiết
        if (weatherCondition === 'Rain') {
            currentWeather = 'stormy'; // Chuyển sang trạng thái mưa
            triggerPetSecretMessage("Trời Thác Bà đang mưa buồn quá... Cùng mình ngồi nghe tiếng mưa rơi nhé?");
        } else if (weatherCondition === 'Clear') {
            currentWeather = 'sunny';
            triggerPetSecretMessage("Ngoài trời nắng đẹp quá! Có muốn ra ngoài làm chút gì đó không?");
        }
    } catch (err) {
        console.log("Đang kết nối với bầu trời Thác Bà...");
    }
}

// Hàm kích hoạt câu nói truyền cảm hứng ngẫu nhiên
function triggerPetSecretMessage(message) {
    const msgBox = document.getElementById('msgBox');
    msgBox.style.borderColor = "#f59e0b"; // Đổi màu viền cho khác biệt
    msgBox.innerText = `💬 "${message}"`;
    
    // Tự động quay lại sau 10 giây
    setTimeout(() => { msgBox.style.borderColor = "#475569"; }, 10000);
}

// Gọi hàm cập nhật mỗi 10 phút
setInterval(syncWeatherWithThacBa, 60000);
	
    initParticles();

    // Vòng lặp tính toán cốt lõi thời gian thực
    setInterval(() => {
        if (!saveState.isAlive || activeGame > 0 || isWheelSpinning || birthdayCountdown > 0 || saveState.petType === null) return;
        
        // Cơ chế đổ bệnh ngẫu nhiên dựa trên vệ sinh/đói
        if (!saveState.isSick && (saveState.clean < 25 || saveState.hunger < 25) && Math.random() > 0.8) {
            saveState.isSick = true;
            document.getElementById('msgBox').innerText = "🤢 Môi trường không đảm bảo khiến bé nhiễm bệnh! Cho bé uống thuốc (Tab Shop) ngay.";
        }

        // Đĩa bay tự động hồi phục niềm vui
        if (saveState.inventory.hasUfo && saveState.happy < 100) {
            saveState.happy = Math.min(100, saveState.happy + 3);
        }

        // Logic ẩn nấp chuồng khi trời bão hoặc đang ngủ
        let isRainOrSleep = (saveState.isSleeping || currentWeather === 'stormy');
        if (isRainOrSleep) {
            if (dogX > 38) {
                dogAction = 'walk'; dir = -1; 
                dogX -= (currentWeather === 'stormy') ? 20 : 4; 
            } else {
                dogX = 35;
                if (saveState.isSleeping) dogAction = 'sleep';
                else { dogAction = 'shelter_head'; dir = 1; }
            }
        }
        if (!isRainOrSleep && dogAction === 'shelter_head') dogAction = 'idle';

        // Tự động di chuyển dạo chơi ngẫu nhiên
        if (!isRainOrSleep && dogAction === 'idle' && Math.random() < 0.2) {
            targetX = Math.floor(Math.random() * 150) + 160; dogAction = 'walk'; dir = targetX > dogX ? 1 : -1;
        }

        // Khấu trừ chỉ số sinh tồn theo thời gian thực
        const now = Date.now();
        const minutesPassed = (now - saveState.lastTick) / (1000 * 60*60);
        saveState.lastTick = now;

        if (minutesPassed > 0) {
            saveState.age += parseFloat(minutesPassed.toFixed(4));
            let mult = saveState.isSleeping ? 0.35 : 1.0;
            if (saveState.isSick) mult *= 2.2;
            
            saveState.hunger = Math.max(0, saveState.hunger - minutesPassed * 1 * mult);
            saveState.thirst = Math.max(0, saveState.thirst - minutesPassed * 2 * mult);
            if (!saveState.isSleeping) {
                saveState.happy = Math.max(0, saveState.happy - minutesPassed * 10);
                saveState.clean = Math.max(0, saveState.clean - minutesPassed * 8);
            }
            
            // Phát hiện tăng cấp độ chẵn để tổ chức sinh nhật đại tiệc
            let curFloor = Math.floor(saveState.age);
            if (curFloor > 0 && curFloor > Math.floor(saveState.age - minutesPassed)) {
                triggerBirthdayParty(curFloor);
            }
        }
        save(); updateUI();

        if(saveState.hunger <= 0 & saveState.thirst <= 0 & saveState.clean <= 0) {
            saveState.isAlive = false; save();
            document.getElementById('msgBox').innerText = "🪦 Thú cưng đã kiệt sức vĩnh viễn. Hãy bấm nút RESET đỏ bên dưới để hồi sinh lại dòng giống.";
        }
    }, 1000);

    // Thay đổi thời tiết ngẫu nhiên mỗi 1200 giây
    setInterval(() => {
        if (activeGame > 0 || isWheelSpinning || saveState.petType === null) return;
        currentWeather = weatherList[Math.floor(Math.random() * weatherList.length)];
        if (currentWeather === 'stormy') document.getElementById('msgBox').innerText = "⛈️ SÉT ĐÁNH LIÊN HỒI! Thú cưng tự động kích hoạt bản năng chạy trốn vào chuồng trú ẩn khẩn cấp!";
        else if (currentWeather === 'snowy') document.getElementById('msgBox').innerText = "❄️ TUYẾT RƠI MÙA ĐÔNG: Không gian đóng băng lý tưởng. Xe Noel bay phát quà lấp lánh bầu trời!";
        else document.getElementById('msgBox').innerText = "☀️ THỜI TIẾT ĐẸP TRỜI: Ánh nắng ban mai rực rỡ, thích hợp để dạo chơi tăng thể lực.";
    }, 1200000);

    function triggerBirthdayParty(newLvl) {
        birthdayCountdown = 250; candleLit = true; saveState.isSleeping = false;
        dogAction = 'walk'; targetX = 220; dir = targetX > dogX ? 1 : -1;
        let roll = Math.random();
        if (roll < 0.4) { saveState.gems += 6; birthdayPrizeText = "6 Kim Cương 💎"; }
        else if (roll < 0.75) { saveState.tickets += 3; birthdayPrizeText = "3 Vé Siêu Cấp 🎫"; }
        else { saveState.coins += 200; saveState.gems += 3; birthdayPrizeText = "200 Vàng 💰 & 3 💎"; }
        switchTab('home');
    }

    function activateWheelUI() {
        if (saveState.tickets < 1) { document.getElementById('msgBox').innerText = "❌ Không đủ Vé Quay 🎫! Hãy vào mục Học Tập để giải toán thi tài kiếm Vé."; return; }
        if (isWheelSpinning) return;
        saveState.tickets--; save(); updateUI();
        isWheelSpinning = true; wheelSpeed = 0.35 + Math.random() * 0.25;
        document.getElementById('msgBox').innerText = "🎰 VÒNG QUAY MA TRẬN ĐANG QUAY VẬT LÝ TUYẾN TÍNH...";
    }

    // HÀM VẼ ĐỒ HỌA THÚ CƯNG THEO TIẾN HÓA (CORE UPGRADE)
    function drawPetBody(bob, isMoving, f) {
        ctx.fillStyle = "#0f172a";
        let petLvl = Math.floor(saveState.age);

        saveState.isSleeping = !saveState.isSleeping;
        if(saveState.isSleeping) {
            document.getElementById('btnSleep').innerText = "☀️ ĐÁNH THỨC"; document.getElementById('msgBox').innerText = "💤 Bé đã chìm vào giấc ngủ phục hồi thể trạng.";
        } else {
            dogAction = 'idle'; document.getElementById('btnSleep').innerText = "💤 CHO NGỦ"; document.getElementById('msgBox').innerText = "☀️ Bình minh! Bé đã dậy và háo hức chờ bạn.";
        }
        save();
    }

    function startMiniGame(id) {
        if (!saveState.isAlive || saveState.isSleeping || saveState.petType === null || currentWeather === 'stormy') return;
        if (activeGame > 0) { stopMiniGame(); return; }
        activeGame = id; gameScore = 0; gameObjects = [];
        document.getElementById(`btnGame${id}`).innerText = "🛑 DỪNG G";
        
        if (id === 1) gameTimer = setInterval(() => gameObjects.push({ x: Math.random()*300+40, y: 0, speed: 3.5 }), 750);
        else if (id === 2) gameTimer = setInterval(() => gameObjects.push({ x: 400, speed: 4.8 + Math.random()*1.2 }), 1000);
        else if (id === 3) {
            // Khởi tạo các lỗ chuột cho game 3
            gameObjects = [
                {x: 80, y: 55, show: 0}, {x: 190, y: 55, show: 0}, {x: 300, y: 55, show: 0},
                {x: 80, y: 95, show: 0}, {x: 190, y: 95, show: 0}, {x: 300, y: 95, show: 0}
            ];
            document.getElementById('msgBox').innerText = "🔨 Hãy click chuột/chạm tay nhanh như chớp trực tiếp vào các Robot chuột xuất hiện!";
        }
    }

    function stopMiniGame() {
        if(activeGame > 0) {
            document.getElementById('btnGame1').innerText = "🦴 HỨNG XƯƠNG"; 
            document.getElementById('btnGame2').innerText = "💣 NÉ BOM";
            document.getElementById('btnGame3').innerText = "🔨 ĐẬP CHUỘT MÁY";
            clearInterval(gameTimer); activeGame = 0; dogAction = 'idle'; save();
        }
    }

    function switchTab(tab) {
        if (isWheelSpinning || birthdayCountdown > 0) return;
        stopMiniGame();
        document.getElementById('panel-home').style.display = tab === 'home' ? 'grid' : 'none';
        document.getElementById('panel-shop').style.display = tab === 'shop' ? 'grid' : 'none';
        document.getElementById('panel-game').style.display = tab === 'game' ? 'grid' : 'none';
        document.getElementById('panel-edu').style.display = tab === 'edu' ? 'block' : 'none';
        
        document.getElementById('tabHome').classList.toggle('active', tab === 'home');
        document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
        document.getElementById('tabGame').classList.toggle('active', tab === 'game');
        document.getElementById('tabEdu').classList.toggle('active', tab === 'edu');
    }

    function updateUI() {
        document.getElementById('uiHunger').innerText = Math.floor(saveState.hunger);
        document.getElementById('uiThirst').innerText = Math.floor(saveState.thirst);
        document.getElementById('uiHappy').innerText = Math.floor(saveState.happy);
        document.getElementById('uiClean').innerText = Math.floor(saveState.clean);
        
        let currentLvl = Math.floor(saveState.age);
        let evoStage = "Sơ Sinh 🌱";
        if (currentLvl >= 3 && currentLvl <= 5) evoStage = "Trưởng Thành 🔥";
        else if (currentLvl >= 6) evoStage = "Huyền Thoại ⚡🎚️";
        
        document.getElementById('uiLevelBadge').innerText = `Cấp độ: Lvl ${currentLvl} (Tiến hóa: ${evoStage} - ${Math.floor((saveState.age - currentLvl) * 100)}%)`;
        
        document.getElementById('txtCoins').innerText = saveState.coins;
        document.getElementById('txtGems').innerText = saveState.gems;
        document.getElementById('txtTickets').innerText = saveState.tickets;
        document.getElementById('lblFood').innerText = saveState.inventory.food;
        document.getElementById('lblWater').innerText = saveState.inventory.water;
        document.getElementById('lblSoap').innerText = saveState.inventory.soap;
        document.getElementById('lblMed').innerText = saveState.inventory.medicine;
        
        document.getElementById('shHat').disabled = currentLvl < 2; 
        document.getElementById('shFlower').disabled = currentLvl < 3;
        document.getElementById('shFence').disabled = currentLvl < 4; 
        document.getElementById('shUfo').disabled = currentLvl < 5;
        
        if (saveState.petType !== null) {
            document.getElementById('txtStage').innerText = ["Cún Con 🐶", "Mèo Máy 🐱", "Gấu Nhỏ 🐻", "Thỏ Bông 🐰", "Rồng Thần 🐲"][saveState.petType - 1];
            document.getElementById('txtStatus').innerText = saveState.isSick ? "🤢 NHIỄM BỆNH" : (saveState.isSleeping ? "💤 ĐANG NGỦ" : "❤️ KHỎE MẠNH");
        }
    }

    function triggerResetUI() { isResetOverlayActive = true; }

    window.addEventListener('keydown', (e) => {
        if (activeGame === 2 && e.code === 'Space' && isGrounded) { jumpVelocity = -10.5; isGrounded = false; sound('jump'); }
    });

    function save() { localStorage.setItem('dogotchi_v12_hyper', JSON.stringify(saveState)); }
    
    // Khởi động render đồ họa ma trận lượng tử
    updateUI();
    if(saveState.petType === null) document.getElementById('msgBox').innerText = "Chào mừng nhà tạo hóa vĩ đại! Hãy chọn 1 giống loài cổ xưa trên màn hình để khởi nguyên sự sống.";
    else document.getElementById('msgBox').innerText = "Hệ thống Hyper Evolution v12.0 đã sẵn sàng vận hành ổn định.";
    render();
</script>
</body>
</html>
